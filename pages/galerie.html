<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Galerie</h1>
    </div>
</div>

<div class="container p-4">
    <div class="text-center mb-3">
        <button
            type="button"
            id="openCreatePictureModal"
            class="btn btn-primary"
            data-show="admin"
            data-bs-toggle="modal"
            data-bs-target="#pictureModal"
        >
            Ajouter une photo
        </button>
    </div>

    <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3"
        id="allImages"
    ></div>

    <div class="text-center mt-3">
        <a href="#" class="btn btn-primary">Réserver</a>
    </div>
</div>

<!-- Modal d’ajout et de modification -->
<div
    class="modal fade"
    id="pictureModal"
    tabindex="-1"
    aria-labelledby="pictureModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="pictureModalLabel">
                    Ajouter une photo
                </h2>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Fermer"
                ></button>
            </div>

            <div class="modal-body">
                <form id="pictureForm">
                    <input
                        type="hidden"
                        id="pictureIdInput"
                    >

                    <div
                        id="pictureFormMessage"
                        class="alert d-none"
                        role="alert"
                    ></div>

                    <div class="mb-3">
                        <label
                            for="pictureTitleInput"
                            class="form-label text-primary"
                        >
                            Titre
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="pictureTitleInput"
                            maxlength="128"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label
                            for="pictureAltTextInput"
                            class="form-label"
                        >
                            Texte alternatif
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="pictureAltTextInput"
                            maxlength="255"
                        >
                    </div>

                    <div class="mb-3">
                        <label
                            for="picturePositionInput"
                            class="form-label"
                        >
                            Position
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            id="picturePositionInput"
                            min="0"
                            value="0"
                            required
                        >
                    </div>

                    <div
                        class="mb-3"
                        id="pictureFileContainer"
                    >
                        <label
                            for="pictureFileInput"
                            class="form-label"
                        >
                            Image
                        </label>

                        <input
                            type="file"
                            class="form-control"
                            id="pictureFileInput"
                            accept="image/jpeg,image/png,image/webp"
                        >

                        <div class="form-text">
                            Formats autorisés : JPG, PNG et WebP.
                            Taille maximale : 5 Mo.
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="picturePublishedInput"
                            checked
                        >

                        <label
                            for="picturePublishedInput"
                            class="form-check-label"
                        >
                            Publier cette image
                        </label>
                    </div>

                    <div class="text-center">
                        <button
                            type="submit"
                            id="savePictureButton"
                            class="btn btn-primary"
                        >
                            Enregistrer
                        </button>

                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Annuler
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal de suppression -->
<div
    class="modal fade"
    id="deletePictureModal"
    tabindex="-1"
    aria-labelledby="deletePictureModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2
                    class="modal-title fs-5"
                    id="deletePictureModalLabel"
                >
                    Supprimer cette photo ?
                </h2>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Fermer"
                ></button>
            </div>

            <div class="modal-body">
                <input
                    type="hidden"
                    id="deletePictureIdInput"
                >

                <div
                    id="deletePictureMessage"
                    class="alert d-none"
                    role="alert"
                ></div>

                <p id="deletePictureTitle"></p>

                <img
                    id="deletePicturePreview"
                    class="rounded w-100 d-none"
                    src=""
                    alt=""
                >

                <div class="text-center mt-3">
                    <button
                        type="button"
                        id="confirmDeletePictureButton"
                        class="btn btn-danger"
                    >
                        Supprimer
                    </button>

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                    >
                        Annuler
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
