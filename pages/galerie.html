<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Galerie </h1> 
    </div>
</div>



<div class="container p-4">

    <div class="text-center">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">Ajouter une photo</button>
    </div>

    <div class="row row-cols-2 row-cols-lg-3"id="allImages">
        
    </div>
        <div class="text-center">
        <a href="#" class="btn btn-primary">Réserver</a>
    </div>
</div>

<!-- Modal Edition-->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="exampleModalLabel">Edition photo</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
       <form>
        <div class="mb-3">
          <label for="NamePhotoInput" class="form-label text-primary">Titre</label>
          <input type="text" class="form-control" id="NamePhotoInput" placeholder="Nom du plat" name="Email"> 
        </div>
         <div class="mb-3">
                  <label for="ImageInput" class="form-label">Image</label>
                  <input type="file" class="form-control" id="ImageInput"  name="Image">
                </div>
                <div class="text-center">
                    <button type="button" class="btn btn-primary">Enregistrer</button>
        </div>
    </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal Suppression-->
<div class="modal fade" id="DeletePhotoModal" tabindex="-1" aria-labelledby="DeletePhotoModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="DeletePhotoModalLabel">Etes vous sur de vouloir supprimer cette photo ?</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
       <form>
        <div class="mb-3">
            <p id="modalTitle"></p>
            <img id="modalImage" class="rounded w-100" alt="Supprimer le plat">
    </div>
        <div class="text-center">
            <button type="button" class="btn btn-danger">Supprimer</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>

        </div>
    </form>
      </div>
    </div>
  </div>
</div>
