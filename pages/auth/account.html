<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Mon compte</h1>
    </div>
</div>

<div class="container py-4">
    <form id="accountForm">
        <div
            id="accountMessage"
            class="alert d-none"
            role="alert"
        ></div>

        <div class="mb-3">
            <label
                for="accountEmailInput"
                class="form-label"
            >
                Adresse e-mail
            </label>

            <input
                type="email"
                class="form-control"
                id="accountEmailInput"
                disabled
            >

            <div class="form-text">
                L’adresse e-mail ne peut pas être modifiée depuis cette page.
            </div>
        </div>

        <div class="mb-3">
            <label
                for="accountLastNameInput"
                class="form-label"
            >
                Nom
            </label>

            <input
                type="text"
                class="form-control"
                id="accountLastNameInput"
                minlength="2"
                maxlength="64"
                required
            >
        </div>

        <div class="mb-3">
            <label
                for="accountFirstNameInput"
                class="form-label"
            >
                Prénom
            </label>

            <input
                type="text"
                class="form-control"
                id="accountFirstNameInput"
                minlength="2"
                maxlength="32"
                required
            >
        </div>

        <div class="mb-3">
            <label
                for="accountAllergyInput"
                class="form-label"
            >
                Allergies
            </label>

            <input
                type="text"
                class="form-control"
                id="accountAllergyInput"
                maxlength="255"
                placeholder="Fruits de mer, arachides…"
            >
        </div>

        <div class="mb-3">
            <label
                for="accountGuestNumberInput"
                class="form-label"
            >
                Nombre habituel de convives
            </label>

            <input
                type="number"
                class="form-control"
                id="accountGuestNumberInput"
                min="1"
                max="50"
            >
        </div>

        <div class="text-center">
            <button
                type="submit"
                id="accountSubmitButton"
                class="btn btn-primary"
            >
                Modifier mes informations
            </button>
        </div>
    </form>

    <div class="text-center pt-4">
        <a
            href="/editPassword"
            class="btn btn-outline-primary"
        >
            Modifier mon mot de passe
        </a>
    </div>
</div>
