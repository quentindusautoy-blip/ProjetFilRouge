<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Modifier Mot de passe</h1>
    </div>
</div>

<div class="container p-4">
    <form id="changePasswordForm">
        <div class="mb-3">
            <label for="NewPasswordInput" class="form-label text-primary">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="NewPasswordInput" placeholder="************" name="NewPassword"> 
        </div>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label text-primary">Confirmer le mot de passe</label>
            <input type="password" class="form-control" id="RepeatPasswordInput" placeholder="************" name="Password">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-danger">Modifier mot de passe</button>
            <button href="/account" type="button" id="cancelBtn" class="btn btn-primary">Annuler</button>
        </div>
    </form>
</div>
