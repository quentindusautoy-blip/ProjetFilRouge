<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Modifier mon mot de passe</h1>
    </div>
</div>

<div class="container py-4">
    <form id="changePasswordForm">
        <div
            id="changePasswordMessage"
            class="alert d-none"
            role="alert"
        ></div>

        <div class="mb-3">
            <label
                for="CurrentPasswordInput"
                class="form-label"
            >
                Mot de passe actuel
            </label>

            <input
                type="password"
                class="form-control"
                id="CurrentPasswordInput"
                autocomplete="current-password"
                required
            >
        </div>

        <div class="mb-3">
            <label
                for="NewPasswordInput"
                class="form-label"
            >
                Nouveau mot de passe
            </label>

            <input
                type="password"
                class="form-control"
                id="NewPasswordInput"
                minlength="8"
                autocomplete="new-password"
                required
            >

            <div class="form-text">
                Le mot de passe doit contenir au moins 8 caractères.
            </div>
        </div>

        <div class="mb-3">
            <label
                for="RepeatPasswordInput"
                class="form-label"
            >
                Confirmer le nouveau mot de passe
            </label>

            <input
                type="password"
                class="form-control"
                id="RepeatPasswordInput"
                minlength="8"
                autocomplete="new-password"
                required
            >
        </div>

        <div class="text-center">
            <button
                type="submit"
                id="changePasswordSubmitButton"
                class="btn btn-danger"
            >
                Modifier le mot de passe
            </button>

            <button
                type="button"
                id="cancelPasswordButton"
                class="btn btn-secondary"
            >
                Annuler
            </button>
        </div>
    </form>
</div>
