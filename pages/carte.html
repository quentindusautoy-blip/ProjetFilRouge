<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Carte &amp; Menus</h1>
    </div>
</div>

<section class="container py-5">
    <div
        id="catalogMessage"
        class="alert d-none"
        role="alert"
    ></div>

    <div
        id="catalogLoading"
        class="text-center py-5"
    >
        <div class="spinner-border text-primary"role="status">
            <span class="visually-hidden">
                Chargement...
            </span>
        </div>

        <p class="mt-3 mb-0">
            Chargement de la carte...
        </p>
    </div>

    <div
        id="catalogContent"
        class="d-none"
    >
        <section
            aria-labelledby="foodCatalogTitle"
        >
            <h2
                id="foodCatalogTitle"
                class="text-center text-primary mb-4"
            >
                Notre carte
            </h2>

            <div
                id="categoriesContainer"
            ></div>
        </section>

        <section
            class="bg-dark text-white rounded p-4 mt-5"
            aria-labelledby="menusTitle"
        >
            <h2
                id="menusTitle"
                class="text-center text-primary mb-4"
            >
                Nos menus
            </h2>

            <div
                id="menusContainer"
                class="row g-4"
            ></div>
        </section>
    </div>
</section>
