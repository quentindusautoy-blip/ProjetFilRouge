<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Gestion des plats</h1>
    </div>
</div>

<div class="container py-4">
    <div
        id="foodAdminMessage"
        class="alert d-none"
        role="alert"
    ></div>

    <section class="border rounded p-4 mb-5">
        <h2
            id="foodFormTitle"
            class="text-center text-primary mb-4"
        >
            Ajouter un plat
        </h2>

        <form id="foodAdminForm">
            <input
                type="hidden"
                id="foodIdInput"
            >

            <div class="row g-3">
                <div class="col-md-6">
                    <label
                        for="foodNameInput"
                        class="form-label"
                    >
                        Nom du plat
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="foodNameInput"
                        minlength="2"
                        maxlength="100"
                        required
                    >
                </div>

                <div class="col-md-6">
                    <label
                        for="foodCategoryInput"
                        class="form-label"
                    >
                        Catégorie
                    </label>

                    <select
                        class="form-select"
                        id="foodCategoryInput"
                        required
                    >
                        <option value="">
                            Sélectionnez une catégorie
                        </option>
                    </select>
                </div>

                <div class="col-12">
                    <label
                        for="foodDescriptionInput"
                        class="form-label"
                    >
                        Description
                    </label>

                    <textarea
                        class="form-control"
                        id="foodDescriptionInput"
                        rows="3"
                        maxlength="2000"
                    ></textarea>
                </div>

                <div class="col-md-6">
                    <label
                        for="foodPriceInput"
                        class="form-label"
                    >
                        Prix
                    </label>

                    <div class="input-group">
                        <input
                            type="number"
                            class="form-control"
                            id="foodPriceInput"
                            min="0.01"
                            max="9999.99"
                            step="0.01"
                            required
                        >

                        <span class="input-group-text">
                            €
                        </span>
                    </div>
                </div>

                <div class="col-md-6 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="foodAvailableInput"
                            checked
                        >

                        <label
                            class="form-check-label"
                            for="foodAvailableInput"
                        >
                            Plat disponible sur la carte
                        </label>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button
                    type="submit"
                    id="foodSubmitButton"
                    class="btn btn-primary"
                >
                    Ajouter le plat
                </button>

                <button
                    type="button"
                    id="foodCancelEditButton"
                    class="btn btn-secondary d-none"
                >
                    Annuler la modification
                </button>
            </div>
        </form>
    </section>

    <section>
        <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3"
        >
            <h2 class="text-primary mb-0">
                Plats enregistrés
            </h2>

            <button
                type="button"
                id="foodRefreshButton"
                class="btn btn-outline-primary"
            >
                Actualiser
            </button>
        </div>

        <div
            id="foodLoading"
            class="text-center py-5"
        >
            <div
                class="spinner-border text-primary"
                role="status"
            >
                <span class="visually-hidden">
                    Chargement...
                </span>
            </div>
        </div>

        <div
            id="foodTableContainer"
            class="table-responsive d-none"
        >
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th scope="col">
                            Nom
                        </th>

                        <th scope="col">
                            Catégorie
                        </th>

                        <th scope="col">
                            Prix
                        </th>

                        <th scope="col">
                            Disponibilité
                        </th>

                        <th scope="col">
                            Menus
                        </th>

                        <th
                            scope="col"
                            class="text-end"
                        >
                            Actions
                        </th>
                    </tr>
                </thead>

                <tbody id="foodTableBody"></tbody>
            </table>
        </div>

        <p
            id="foodEmptyMessage"
            class="text-center text-muted d-none"
        >
            Aucun plat n’est enregistré.
        </p>
    </section>
</div>
